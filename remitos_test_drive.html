<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Remitos Test Drive · Yacopini BYD</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
  :root{
    --negro:#0A0A0A;
    --carbon:#2A2A2A;
    --gris-oscuro:#4A4A4A;
    --gris-medio:#8C8C8C;
    --gris-claro:#D4D4D4;
    --gris-fondo:#F2F2F2;
    --blanco:#FFFFFF;
    --radius:12px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--gris-fondo);
    color:var(--carbon);
    font-family:'Segoe UI', Arial, Helvetica, sans-serif;
  }

  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--negro);
    color:#fff;
    padding:16px 18px 15px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .topbar img{ height:30px; display:block; }
  .topbar svg{ height:30px; width:auto; display:block; }
  .topbar .sub{
    font-size:11px;
    color:#B8B8B8;
    text-align:right;
    line-height:1.5;
  }
  .topbar .sub .doctype{
    font-size:12.5px;
    font-weight:700;
    color:#fff;
    letter-spacing:.02em;
  }

  main{max-width:520px;margin:0 auto;padding:18px 16px 24px;}
  .view{display:none;}
  .view.active{display:block;animation:fade .18s ease;}
  @keyframes fade{from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}

  h1.section-title{
    font-size:13.5px;
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:.06em;
    color:var(--gris-oscuro);
    margin:0 0 12px;
  }

  .card{
    background:var(--blanco);
    border:1px solid var(--gris-claro);
    border-radius:var(--radius);
    padding:18px;
    margin-bottom:14px;
  }

  label{
    display:block;
    font-size:11.5px;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:.03em;
    color:#8A97A3;
    margin:13px 0 5px;
  }
  label:first-child{margin-top:0;}
  input[type=text],input[type=date],input[type=time],input[type=number],select,textarea{
    width:100%;
    padding:10px 11px;
    border:1px solid var(--gris-claro);
    border-radius:8px;
    font-size:14.5px;
    font-family:inherit;
    background:var(--blanco);
    color:var(--carbon);
  }
  input:hover,select:hover,textarea:hover{ background:var(--gris-fondo); }
  input:focus,select:focus,textarea:focus{
    outline:none;border-color:var(--gris-medio);background:var(--blanco);
  }
  textarea{resize:vertical;min-height:60px;}
  .row2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px;}

  .btn{
    display:inline-flex;align-items:center;justify-content:center;gap:8px;
    padding:11px 16px;border-radius:8px;
    font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;
    width:100%;
    border:1px solid var(--gris-claro);
    background:var(--blanco);color:var(--carbon);
    transition:background .15s ease;
  }
  .btn:hover{ background:var(--gris-fondo); }
  .btn:active{ transform:scale(0.99); }
  .btn-primary{background:var(--negro);color:#fff;border-color:var(--negro);}
  .btn-primary:hover{background:var(--carbon);}
  .btn-ghost{background:var(--blanco);color:var(--carbon);}
  .btn-danger{background:#FCEBEB;color:#A32D2D;border-color:#F0C1C1;}
  .btn-danger:hover{background:#F9DCDC;}

  .empty{
    text-align:center;color:var(--gris-medio);padding:36px 12px;font-size:13.5px;
  }
  .empty .big{font-size:30px;display:block;margin-bottom:8px;}

  .vlist-item, .rlist-item{
    display:flex;justify-content:space-between;align-items:center;
    padding:12px 4px;border-top:1px solid var(--gris-claro);
  }
  .vlist-item:first-child,.rlist-item:first-child{border-top:none;}
  .vlist-item .info b,.rlist-item .info b{display:block;font-size:14px;color:var(--negro);}
  .vlist-item .info span,.rlist-item .info span{font-size:12px;color:var(--gris-medio);}
  .actions{display:flex;gap:6px;}
  .icon-btn{
    border:1px solid var(--gris-claro);background:var(--blanco);color:var(--carbon);
    width:32px;height:32px;border-radius:8px;font-size:13px;cursor:pointer;
  }
  .icon-btn:hover{background:var(--gris-fondo);}
  .icon-btn.danger{background:#FCEBEB;color:#A32D2D;border-color:#F0C1C1;}
  .icon-btn.danger:hover{background:#F9DCDC;}

  .badge{
    display:inline-block;font-size:11px;font-weight:700;
    background:var(--gris-fondo);color:var(--negro);padding:3px 9px;border-radius:20px;
    border:1px solid var(--gris-claro);letter-spacing:.02em;
  }

  .tabbar{
    background:var(--blanco);border-bottom:1px solid var(--gris-claro);
    display:flex;
  }
  .tabbar button{
    flex:1;border:none;background:none;padding:13px 4px 11px;
    font-family:inherit;font-size:12.5px;font-weight:700;color:var(--gris-medio);
    cursor:pointer;
    border-bottom:2px solid transparent;
    letter-spacing:.01em;
  }
  .tabbar button.active{color:var(--negro);border-bottom-color:var(--negro);}

  .toast{
    position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
    background:var(--negro);color:#fff;padding:10px 18px;border-radius:10px;
    font-size:13px;font-weight:600;z-index:60;opacity:0;pointer-events:none;transition:opacity .2s;
    box-shadow:0 4px 14px rgba(0,0,0,.18);
  }
  .toast.show{ opacity:1; }

  .hint{
    font-size:12px;color:#8A97A3;line-height:1.55;margin:0 0 10px;
  }
  .format-sample{
    display:block;padding:9px 10px;font-size:11.5px;line-height:1.6;
    background:var(--gris-fondo);color:var(--carbon);border:1px solid var(--gris-claro);
    border-radius:8px;font-family:'Courier New',monospace;white-space:normal;
  }

  /* ---- Overlay / ticket preview ---- */
  .overlay{
    position:fixed;inset:0;background:rgba(10,10,10,.6);
    display:flex;align-items:flex-end;justify-content:center;z-index:100;
  }
  .overlay.hidden{display:none;}
  .sheet{
    background:var(--gris-fondo);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;
    border-radius:18px 18px 0 0;padding:16px 14px 22px;
  }
  .sheet-handle{width:36px;height:4px;background:var(--gris-claro);border-radius:2px;margin:2px auto 14px;}
  .sheet-actions{display:flex;gap:8px;margin-top:14px;}

  .ticket{
    background:var(--blanco);
    border:1px solid var(--gris-claro);
    border-radius:10px;
    overflow:hidden;
    position:relative;
    background-image:url("data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A//www.w3.org/2000/svg%22%20width%3D%22480%22%20height%3D%22360%22%3E%3Ctext%20x%3D%22240%22%20y%3D%2280%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20font-weight%3D%22700%22%20fill%3D%22rgba%2810%2C10%2C10%2C0.045%29%22%20transform%3D%22rotate%28-28%20240%2080%29%22%20text-anchor%3D%22middle%22%3EBYD%20YACOPINI%3C/text%3E%3Ctext%20x%3D%22240%22%20y%3D%22200%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20font-weight%3D%22700%22%20fill%3D%22rgba%2810%2C10%2C10%2C0.045%29%22%20transform%3D%22rotate%28-28%20240%20200%29%22%20text-anchor%3D%22middle%22%3EBYD%20YACOPINI%3C/text%3E%3Ctext%20x%3D%22240%22%20y%3D%22320%22%20font-family%3D%22Arial%22%20font-size%3D%2216%22%20font-weight%3D%22700%22%20fill%3D%22rgba%2810%2C10%2C10%2C0.045%29%22%20transform%3D%22rotate%28-28%20240%20320%29%22%20text-anchor%3D%22middle%22%3EBYD%20YACOPINI%3C/text%3E%3C/svg%3E");
    background-repeat:repeat;
  }
  .ticket-head{
    background:var(--negro);
    padding:18px 18px 15px;
    display:flex;justify-content:space-between;align-items:flex-start;
    -webkit-print-color-adjust:exact;
    print-color-adjust:exact;
  }
  .ticket-head img{height:24px;display:block;}
  .ticket-head svg{height:22px;width:auto;display:block;}
  .ticket-head .doctype{font-size:11px;color:#B8B8B8;margin-top:8px;letter-spacing:.02em;}
  .ticket-num{text-align:right;}
  .ticket-num .lbl{font-size:9.5px;color:#9A9A9A;letter-spacing:.1em;text-transform:uppercase;}
  .ticket-num .num{font-family:'Courier New',monospace;font-size:19px;font-weight:700;color:#fff;letter-spacing:.03em;}
  .ticket-body{padding:16px 18px 6px;position:relative;}
  .tgroup{margin-bottom:14px;}
  .tgroup .tglabel{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8A97A3;margin-bottom:6px;font-weight:700;}
  .tgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;}
  .tfield .k{font-size:10.5px;color:var(--gris-medio);}
  .tfield .v{font-size:14px;font-weight:700;color:var(--negro);}
  .tfield.full{grid-column:1/-1;}
  .tnote{font-size:13px;color:var(--carbon);white-space:pre-wrap;}
  .tperf{
    height:0;border-top:1px dashed var(--gris-claro);margin:4px 18px 0;position:relative;
  }
  .tperf::before,.tperf::after{
    content:"";position:absolute;top:-8px;width:16px;height:16px;border-radius:50%;background:var(--gris-fondo);
  }
  .tperf::before{left:-26px;}
  .tperf::after{right:-26px;}
  .tsign{padding:16px 18px 20px;display:grid;grid-template-columns:1fr 1fr;gap:16px;position:relative;}
  .sign-line{border-top:1px solid var(--negro);margin-top:104px;padding-top:5px;font-size:10.5px;color:var(--gris-medio);text-align:center;}
  .sign-resp{text-align:center;}
  .sign-resp img{height:102px;object-fit:contain;display:block;margin:0 auto 2px;}
  .sign-resp .resp-underline{border-top:1px solid var(--negro);}
  .sign-resp .resp-name{font-size:11px;font-weight:700;color:var(--negro);margin-top:5px;}
  .sign-resp .resp-role{font-size:9.5px;color:var(--gris-medio);margin-top:1px;}
  .sign-resp .resp-label{font-size:10.5px;color:var(--gris-medio);margin-top:2px;}
  .ticket-footer{
    padding:10px 18px 16px;font-size:10px;color:var(--gris-medio);line-height:1.5;
    border-top:1px solid var(--gris-claro);
  }

  @media(max-width:380px){
    .tgrid{grid-template-columns:1fr 1fr;}
  }

  @media print{
    body *{visibility:hidden;}
    #printArea, #printArea *{visibility:visible;}
    #printArea{position:absolute;top:0;left:0;width:100%;}
    body{background:#fff;padding:0;}
    .ticket{border:none;}
    .tperf::before,.tperf::after{background:#fff;}
  }
</style>
</head>
<body class="gate-locked">
<div id="bydGate" style="position:fixed;inset:0;z-index:999999;background:#0A0A0A;display:flex;align-items:center;justify-content:center;padding:24px;opacity:1;">
  <form id="bydGateForm" style="width:100%;max-width:300px;text-align:center;font-family:Arial,sans-serif;">
    <div style="color:#fff;font-weight:800;font-size:16px;margin-bottom:4px;">BYD Yacopini</div>
    <div style="color:#8C8C8C;font-size:12px;margin-bottom:18px;">Acceso interno &middot; Gerencia</div>
    <input id="bydGatePass" type="password" inputmode="numeric" placeholder="Clave" autocomplete="off" style="width:100%;padding:12px 14px;border-radius:10px;border:1px solid #4A4A4A;background:#2A2A2A;color:#fff;font-size:16px;text-align:center;box-sizing:border-box;">
    <button type="submit" style="width:100%;margin-top:10px;padding:12px;border-radius:10px;border:none;background:#1565D8;color:#fff;font-weight:700;font-size:14px;">Entrar</button>
    <div id="bydGateError" style="color:#E85555;font-size:12px;margin-top:10px;display:none;">Clave incorrecta</div>
  </form>
</div>
<style>
  body.gate-locked > *:not(#bydGate){display:none !important;}
  #bydGate{ transition:opacity .25s ease; }
  #bydGate.fadeOut{ opacity:0; }
</style>
<script>
(function(){
  var HASH = "a734aecec77bc8826bec68f0264b70228ab419e52a8fcdf05016ebee0465f257";
  var body = document.body;
  function unlock(){ var g=document.getElementById('bydGate'); if(g){ g.classList.add('fadeOut'); setTimeout(function(){ body.classList.remove('gate-locked'); g.remove(); }, 220); } else { body.classList.remove('gate-locked'); } }
  if (sessionStorage.getItem('bydGateOk') === '1') { unlock(); }
  else {
    document.getElementById('bydGateForm').addEventListener('submit', function(e){
      e.preventDefault();
      var val = document.getElementById('bydGatePass').value;
      crypto.subtle.digest('SHA-256', new TextEncoder().encode(val)).then(function(buf){
        var hex = Array.from(new Uint8Array(buf)).map(function(b){return b.toString(16).padStart(2,'0');}).join('');
        if (hex === HASH) {
          sessionStorage.setItem('bydGateOk','1');
          unlock();
        } else {
          document.getElementById('bydGateError').style.display = 'block';
          document.getElementById('bydGatePass').value = '';
          document.getElementById('bydGatePass').focus();
        }
      });
    });
  }
})();
</script>

<main>
  <!-- NUEVO REMITO -->

      <label for="selVehiculo">Vehículo de test drive</label>

      <label for="inpKm">Km de salida</label>

      <label for="inpFechaSal">Fecha salida</label>

      <label for="inpFechaRet">Regreso estimado</label>

<script>
let state = { vehicles: [], remitos: [], counter: 0 };

function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 1800);
}

async function loadState(){
  try{
    const raw = localStorage.getItem('remitos_app_state');
    if(raw){
      state = JSON.parse(raw);
      state.vehicles = state.vehicles || [];
      state.remitos = state.remitos || [];
      state.counter = state.counter || 0;
    }
  }catch(e){
    // no existing key yet, keep defaults
  }
  renderVehiculosSelect();
  renderVehiculosList();
  renderHistorial();
}

async function saveState(){
  try{
    localStorage.setItem('remitos_app_state', JSON.stringify(state));
  }catch(e){
    toast('Error al guardar');
    console.error(e);
  }
}

function switchTab(tab){
  document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
  document.getElementById('view-'+tab).classList.add('active');
  document.querySelectorAll('.tabbar button').forEach(b=>b.classList.toggle('active', b.dataset.tab===tab));
}
document.querySelectorAll('.tabbar button').forEach(b=>{
  b.addEventListener('click', ()=>switchTab(b.dataset.tab));
});

function fmtDate(iso){
  if(!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

/* ---------- VEHICULOS ---------- */
function renderVehiculosSelect(){
  const sel = document.getElementById('selVehiculo');
  if(state.vehicles.length === 0){
    sel.innerHTML = `<option value="">— Cargá vehículos en la pestaña Vehículos —</option>`;
    return;
  }
  sel.innerHTML = state.vehicles.map(v=>
    `<option value="${v.id}">${v.marca} · ${v.patente}</option>`
  ).join('');
}

function renderVehiculosList(){
  const el = document.getElementById('vehiculosList');
  if(state.vehicles.length===0){
    el.innerHTML = `<div class="empty"><span class="big">🚘</span>Todavía no cargaste vehículos habilitados para test drive.</div>`;
    return;
  }
  el.innerHTML = state.vehicles.map(v=>`
    <div class="vlist-item">
      <div class="info">
        <b>${v.marca}</b>
        <span>${v.patente} · ${v.color||'—'}${v.chasis?(' · Chasis '+v.chasis):''}</span>
      </div>
      <div class="actions">
        <button class="icon-btn danger" onclick="deleteVehicle('${v.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

document.getElementById('btnAddVehiculo').addEventListener('click', async ()=>{
  const marca = document.getElementById('vMarca').value.trim();
  const patente = document.getElementById('vPatente').value.trim().toUpperCase();
  const color = document.getElementById('vColor').value.trim();
  const chasis = document.getElementById('vChasis').value.trim();
  const motor = document.getElementById('vMotor').value.trim();
  if(!marca || !patente){ toast('Falta marca o patente'); return; }
  state.vehicles.push({ id: 'v'+Date.now(), marca, patente, color, chasis, motor });
  await saveState();
  ['vMarca','vPatente','vColor','vChasis','vMotor'].forEach(id=>document.getElementById(id).value='');
  renderVehiculosSelect();
  renderVehiculosList();
  toast('Vehículo agregado');
});

async function deleteVehicle(id){
  if(!confirm('¿Quitar este vehículo de la flota habilitada?')) return;
  state.vehicles = state.vehicles.filter(v=>v.id!==id);
  await saveState();
  renderVehiculosSelect();
  renderVehiculosList();
}

(function setDefaultDates(){
  const now = new Date();
  const iso = now.toISOString().slice(0,10);
  const hh = String(now.getHours()).padStart(2,'0');
  const mm = String(now.getMinutes()).padStart(2,'0');
  document.getElementById('inpFechaSal').value = iso;
  document.getElementById('inpHoraSal').value = `${hh}:${mm}`;
  document.getElementById('inpFechaRet').value = iso;
})();

document.getElementById('btnGenerar').addEventListener('click', async ()=>{
  const vehId = document.getElementById('selVehiculo').value;
  const vehicle = state.vehicles.find(v=>v.id===vehId);
  const nombre = document.getElementById('inpNombre').value.trim();
  const dni = document.getElementById('inpDni').value.trim();

  if(!vehicle){ toast('Elegí un vehículo'); return; }
  if(!nombre || !dni){ toast('Faltan datos del cliente'); return; }

  state.counter += 1;
  const numero = 'RD-' + String(state.counter).padStart(4,'0');

  const remito = {
    id: 'r'+Date.now(),
    numero,
    vehicle: {...vehicle},
    km: document.getElementById('inpKm').value.trim(),
    fechaSalida: document.getElementById('inpFechaSal').value,
    horaSalida: document.getElementById('inpHoraSal').value,
    fechaRegreso: document.getElementById('inpFechaRet').value,
    horaRegreso: document.getElementById('inpHoraRet').value,
    cliente: {
      nombre,
      dni,
      telefono: document.getElementById('inpTel').value.trim(),
      licencia: document.getElementById('inpLicencia').value.trim(),
      email: document.getElementById('inpEmail').value.trim(),
    },
    responsable: document.getElementById('inpResponsable').value.trim(),
    observaciones: document.getElementById('inpObs').value.trim(),
    createdAt: new Date().toISOString()
  };

  state.remitos.unshift(remito);
  await saveState();
  renderHistorial();
  openTicket(remito);

  ['inpNombre','inpDni','inpTel','inpLicencia','inpEmail','inpObs','inpKm'].forEach(id=>document.getElementById(id).value='');
  toast('Remito '+numero+' generado');
});

/* ---------- HISTORIAL ---------- */
function renderHistorial(){
  const el = document.getElementById('historialList');
  if(state.remitos.length===0){
    el.innerHTML = `<div class="empty"><span class="big">📋</span>Todavía no generaste remitos.</div>`;
    return;
  }
  el.innerHTML = state.remitos.map(r=>`
    <div class="rlist-item">
      <div class="info">
        <b>${r.cliente.nombre} <span class="badge">${r.numero}</span></b>
        <span>${r.vehicle.marca} · ${r.vehicle.patente} · Sale ${fmtDate(r.fechaSalida)}</span>
      </div>
      <div class="actions">
        <button class="icon-btn" onclick="openTicketById('${r.id}')">👁</button>
        <button class="icon-btn danger" onclick="deleteRemito('${r.id}')">✕</button>
      </div>
    </div>
  `).join('');
}

function openTicketById(id){
  const r = state.remitos.find(x=>x.id===id);
  if(r) openTicket(r);
}

async function deleteRemito(id){
  if(!confirm('¿Eliminar este remito del historial?')) return;
  state.remitos = state.remitos.filter(r=>r.id!==id);
  await saveState();
  renderHistorial();
}

        const body = iframe.contentDocument.body;
        html2canvas(body, {
          scale: 2,
          useCORS: true,
          allowTaint: true,
          backgroundColor: '#ffffff',
          width: 800,
          height: body.scrollHeight,
          scrollX: 0,
          scrollY: 0,
          logging: false
        }).then(function(canvas){
          const A4_W = 595, A4_H = 842;
          const imgHeight = (canvas.height * A4_W) / canvas.width;
          let finalW = A4_W, finalH = imgHeight, offsetY = 0;
          if (imgHeight > A4_H) {
            const scale = A4_H / imgHeight;
            finalW = A4_W * scale;
            finalH = A4_H;
          } else {
            offsetY = 0;
          }
          const offsetX = (A4_W - finalW) / 2;
          const jsPDF = window.jspdf.jsPDF;
          const pdf = new jsPDF({ orientation:'portrait', unit:'pt', format:'a4' });
          const imgData = canvas.toDataURL('image/jpeg', 0.95);
          pdf.addImage(imgData, 'JPEG', offsetX, offsetY, finalW, finalH);
          pdf.save(nombreArchivo);
          limpiar();
        }).catch(function(e){
          console.error(e);
          alert('No se pudo generar el PDF. Probá de nuevo.');
          limpiar();
        });
      }catch(e){
        console.error(e);
        alert('No se pudo generar el PDF. Probá de nuevo.');
        limpiar();
      }
    }, 500);
  };

  const blob = new Blob([contenido], { type:'text/html' });
  const url = URL.createObjectURL(blob);
  iframe.src = url;
  setTimeout(function(){ URL.revokeObjectURL(url); }, 6000);
}

document.getElementById('btnImprimir').addEventListener('click', function(){
  if(!remitoActual) return;
  const r = remitoActual;
  const slugCliente = (r.cliente.nombre || 'remito').toLowerCase()
    .replace(/[^a-z0-9]+/g, '_').replace(/^_+|_+$/g, '') || 'remito';
  generarPdfDesdeHtml(generarHtmlRemitoPdf(r), 'remito_' + r.numero + '_' + slugCliente + '.pdf', this);
});

loadState();
